<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nazgûl</title>
  <style>
    body {
      max-width: 650px;
      margin: 60px auto;
      font-family: serif;
      line-height: 1.7;
    }
    h1 {
      font-weight: normal;
    }
    a {
      text-decoration: none;
      color: black;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<h1>Nazgûl</h1>

<ul>
  {% raw %}{% for post in site.posts %}{% endraw %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a>
    </li>
  {% raw %}{% endfor %}{% endraw %}
</ul>

</body>
</html>
